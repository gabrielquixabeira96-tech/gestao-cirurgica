# =============================================================
# Netlify Configuration — Rastreamento Oncológico em Massa
# Docs: https://docs.netlify.com/integrations/frameworks/next-js/
# =============================================================

[build]
  command   = "npm run build"
  publish   = ".next"

[build.environment]
  NODE_VERSION = "20"
  # Garante que o Prisma gere o cliente durante o build
  PRISMA_GENERATE_SKIP_AUTOINSTALL = "false"

# Plugin oficial do Netlify para Next.js (App Router, Server Components, etc.)
[[plugins]]
  package = "@netlify/plugin-nextjs"

# =============================================================
# Redirecionamentos e Cabeçalhos de Segurança
# =============================================================

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

# Cache para assets estáticos do Next.js
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
